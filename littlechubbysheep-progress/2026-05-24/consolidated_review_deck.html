    :root {

    * { box-sizing: border-box; }

    .shell-slide.active { opacity: 1; pointer-events: auto; transform: translateX(0); }
    .slide-frame { width: min(calc(100vw - 56px), calc((100vh - 100px) * 16 / 9), 1440px); aspect-ratio: 16 / 9; height: auto; border: 0; background: #efe8df; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42); }

    .nav-button { width: 34px; height: 30px; border: 1px solid #d7cfc5; border-radius: 6px; background: #fffdf8; color: var(--shell-ink); font-size: 17px; line-height: 1; cursor: pointer; }
    .nav-button:hover { border-color: var(--shell-accent); color: var(--shell-accent); }
    .status { display: grid; gap: 2px; min-width: 210px; text-align: center; }
    .counter { color: var(--shell-muted); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { color: var(--shell-ink); font-size: 13px; font-weight: 760; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dots { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; padding: 8px 10px; border-radius: 999px; background: rgba(255, 253, 248, 0.78); border: 1px solid var(--shell-line); backdrop-filter: blur(10px); }
    .dot { width: 9px; height: 9px; border-radius: 999px; border: 0; padding: 0; background: rgba(24, 32, 37, 0.24); cursor: pointer; }
    .dot.active { background: var(--shell-accent); }
    @media (max-width: 720px) {
      .shell-slide { padding: 20px 12px 64px; }
      .slide-frame { width: min(calc(100vw - 24px), calc((100vh - 116px) * 16 / 9)); }
      .status { min-width: 156px; }
      .title { max-width: 156px; }
    }

      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: start;
      padding: 36px 54px 16px;
      border-bottom: 1px solid rgba(231, 221, 210, 0.8);
    }

    .kicker {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      max-width: 970px;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 650;
    }

    .page-tag {
      min-width: 150px;
      padding-top: 4px;
      text-align: right;
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
    }

    .case-content {
      min-height: 0;
      display: grid;
      gap: 18px;
      padding: 20px 54px 10px;
    }

    .waterfall-content {
      grid-template-columns: 1fr;
    }

    .growth-content {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) auto;
      padding-top: 18px;
    }

    .chart-wrap {
      margin: 0;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      display: grid;
      align-items: center;
    }

    .chart-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: 100%;
      object-fit: contain;
    }

    .diff-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    .diff-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .diff-value {
      color: var(--orange);
      font-size: 26px;
      line-height: 1;
      font-weight: 820;
      white-space: nowrap;
    }

    .diff-label {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.22;
      font-weight: 650;
    }

    .evidence-footer {
      display: grid;
      gap: 6px;
      padding: 0 54px 16px;
      color: var(--muted);
    }

    .source-text,
    .note-text {
      margin: 0;
      font-size: 10px;
      line-height: 1.25;
    }

    .source-text strong,
    .note-text strong {
      color: var(--ink);
      font-weight: 760;
    }

    .brand {
      color: var(--ink);
      font-weight: 760;
    }

    @media (max-width: 920px) {
      .deck {
        padding: 0;
      }

      .slide {
        width: 100%;
        min-height: 100vh;
        aspect-ratio: auto;
      }

      .header,
      .case-content,
      .evidence-footer {
        padding-left: 24px;
        padding-right: 24px;
      }

      .header,
      .waterfall-content,
      .diff-band {
        grid-template-columns: 1fr;
      }

      .page-tag {
        text-align: left;
      }

      h1 {
        font-size: 30px;
      }

      .chart-wrap {
        min-height: 360px;
      }
    }

  <script>
    const slides = [...document.querySelectorAll('.shell-slide')];
    const dots = [...document.querySelectorAll('.dot')];
    const counter = document.getElementById('counter');
    const slideTitle = document.getElementById('slideTitle');
    let current = 0;

    function show(index) {
      current = (index + slides.length) % slides.length;
      slides.forEach((slide, i) => slide.classList.toggle('active', i === current));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
      counter.textContent = `${current + 1} / ${slides.length}`;
      slideTitle.textContent = slides[current].dataset.title || '';
    }

    document.getElementById('prev').addEventListener('click', () => show(current - 1));
    document.getElementById('next').addEventListener('click', () => show(current + 1));
    dots.forEach(dot => dot.addEventListener('click', () => show(Number(dot.dataset.go))));
    window.addEventListener('keydown', (event) => {
      if (['ArrowRight', 'PageDown', ' '].includes(event.key)) { event.preventDefault(); show(current + 1); }
      if (['ArrowLeft', 'PageUp'].includes(event.key)) { event.preventDefault(); show(current - 1); }
      if (event.key === 'Home') { event.preventDefault(); show(0); }
      if (event.key === 'End') { event.preventDefault(); show(slides.length - 1); }
    });
  </script>
