<html lang="en">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Asset Class Return Quilt</title>
<style>
  :root { --ink: #14191f; --muted: #5d6670; --panel: #ffffff; --line: #d8dde2; --select: #1677ff; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; color: var(--ink); font-family: Arial, Helvetica, sans-serif; overflow: hidden; }
  .wrap { max-width: 1800px; margin: 0 auto; padding: 8px 10px 6px; }
  .header { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-bottom: 4px; }
  h1, .sub { display: none; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
  .status { font-size: 14px; font-weight: 700; color: #1e2a35; min-width: 210px; text-align: right; }
  button { border: 1px solid #bcc7d3; background: #fff; color: #1c2733; border-radius: 6px; padding: 5px 9px; font-weight: 700; cursor: pointer; }
  button:hover { border-color: #8292a3; }
  .stage { background: var(--panel); border: 0; border-radius: 0; overflow: hidden; box-shadow: none; }
  svg { display: block; width: 100%; height: calc(100vh - 42px); }
  text { font-family: Arial, Helvetica, sans-serif; }
  .cell-text { font-size: 12px; font-weight: 700; pointer-events: none; }
  .year-label { font-size: 16px; font-weight: 700; pointer-events: none; }
  .column-hit { fill: transparent; cursor: pointer; }
  .year-column:hover .column-outline { stroke: #7aaeff; stroke-width: 2; opacity: 1; }
  .year-column.selected .column-outline { stroke: var(--select); stroke-width: 3; opacity: 1; }
  .year-column.in-range .range-bg { fill: #eaf3ff; opacity: .72; }
  .column-outline { fill: none; stroke: transparent; opacity: 0; pointer-events: none; }
  .range-bg { fill: transparent; pointer-events: none; }
  .computed-bg { fill: #f4f0f7; opacity: .95; }
  .computed-title { font-size: 14px; font-weight: 700; fill: #5a2c75; pointer-events: none; }
  .legend { font-size: 17px; }
  .legend .prefix { font-weight: 700; }
  .source { font-size: 12px; fill: #4f5963; }
  .note { display: none; }
</style>
</head>
<body>

    </div>
  </div>
  <div class="stage">

  </div>
  <div class="note">Click one year to start a selection, then click another year to set the range. The rightmost column is recalculated using geometric annualized returns for the selected inclusive period.</div>
</div>

}
function textColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 < 0.55 ? '#fff' : '#27313a';
}
function formatPct(v) { return `${v.toFixed(1)}%`; }
function sortedPairData(year) { return RANKED[year].slice().sort((a,b) => b[1] - a[1]); }
function annualized(start, end) {
  const s = Math.min(Number(start), Number(end));
  const e = Math.max(Number(start), Number(end));
  const span = e - s + 1;
  return ASSETS.map(asset => {
    let product = 1;
    for (let y = s; y <= e; y++) product *= (1 + RETURNS[String(y)][asset] / 100);
    return [asset, (Math.pow(product, 1 / span) - 1) * 100];
  }).sort((a,b) => b[1] - a[1]);
}
function drawCell(x, y, asset, value, parent = svg) {
  const fill = COLORS[asset];
  el('rect', { x, y, width: cfg.cellW, height: cfg.cellH - 1, fill }, parent);
  textNode({ class: 'cell-text', x: x + cfg.cellW/2, y: y + 16, 'text-anchor': 'middle', fill: textColor(fill) }, formatPct(value), parent);
}
function drawColumn(year, index, data) {
  const x = cfg.x0 + index * (cfg.cellW + cfg.colGap);
  const group = el('g', { class: 'year-column', 'data-year': year, tabindex: 0, role: 'button', 'aria-label': `Select ${year}` });
  const positives = data.filter(d => d[1] >= 0);
  const negatives = data.filter(d => d[1] < 0);
  el('rect', { class: 'range-bg', x: x - 3, y: cfg.topPad, width: cfg.cellW + 6, height: cfg.bottomPad - cfg.topPad }, group);
  let y = cfg.yBase - positives.length * cfg.cellH;
  for (const [asset, value] of positives) { drawCell(x, y, asset, value, group); y += cfg.cellH; }
  textNode({ class: 'year-label', x: x + cfg.cellW/2, y: cfg.yBase + cfg.yearLane, 'text-anchor': 'middle', fill: '#000' }, year, group);
  y = cfg.yBase + cfg.yearLane + cfg.negGap;
  for (const [asset, value] of negatives) { drawCell(x, y, asset, value, group); y += cfg.cellH; }
  el('rect', { class: 'column-outline', x: x - 4, y: cfg.topPad, width: cfg.cellW + 8, height: cfg.bottomPad - cfg.topPad, rx: 4 }, group);
  el('rect', { class: 'column-hit', x: x - 5, y: cfg.topPad, width: cfg.cellW + 10, height: cfg.bottomPad - cfg.topPad + 22 }, group);
  group.addEventListener('click', () => selectYear(year));
  group.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); selectYear(year); } });
}
function drawComputedColumn(data) {
  const x = cfg.x0 + YEARS.length * (cfg.cellW + cfg.colGap) + cfg.computedGap;
  const group = el('g', { id: 'computed-column' });
  el('rect', { class: 'computed-bg', x: x - 7, y: cfg.topPad, width: cfg.cellW + 14, height: cfg.bottomPad - cfg.topPad + 22, rx: 6 }, group);
  const positives = data.filter(d => d[1] >= 0);
  const negatives = data.filter(d => d[1] < 0);
  let y = cfg.yBase - positives.length * cfg.cellH;
  for (const [asset, value] of positives) { drawCell(x, y, asset, value, group); y += cfg.cellH; }
  const s = Math.min(Number(selected[0]), Number(selected[1]));
  const e = Math.max(Number(selected[0]), Number(selected[1]));
  textNode({ class: 'year-label', x: x + cfg.cellW/2, y: cfg.yBase + cfg.yearLane, 'text-anchor': 'middle', fill: '#000' }, `${s}-${e}`, group);
  textNode({ class: 'computed-title', x: x + cfg.cellW/2, y: cfg.yBase + cfg.yearLane + 18, 'text-anchor': 'middle' }, 'Annualized', group);
  y = cfg.yBase + cfg.yearLane + cfg.negGap + 18;
  for (const [asset, value] of negatives) { drawCell(x, y, asset, value, group); y += cfg.cellH; }
}
function drawLegend() {
  const dividerX = cfg.legendX - 42;
  el('line', { x1: dividerX, y1: 18, x2: dividerX, y2: 705, stroke: '#000', 'stroke-width': 5 });
  let y = 118;
  for (const [prefix, name, asset] of LEGEND) {
    el('rect', { x: cfg.legendX, y: y - 14, width: 15, height: 15, fill: COLORS[asset] });
    const t = textNode({ class: 'legend', x: cfg.legendX + 34, y, fill: '#000' }, '');
    const a = document.createElementNS(ns, 'tspan'); a.setAttribute('class', 'prefix'); a.textContent = `${prefix}:`; t.appendChild(a);
    const b = document.createElementNS(ns, 'tspan'); b.textContent = ` ${name}`; t.appendChild(b);
    y += 24;
  }
}
function updateHighlights() {
  const s = Math.min(Number(selected[0]), Number(selected[1]));
  const e = Math.max(Number(selected[0]), Number(selected[1]));
  svg.querySelectorAll('.year-column').forEach(g => {
    const year = Number(g.dataset.year);
    g.classList.toggle('selected', year === Number(selected[0]) || year === Number(selected[1]));
    g.classList.toggle('in-range', year >= s && year <= e);
  });
  statusEl.textContent = `Selected: ${s}-${e} (${e - s + 1} yrs)`;
}
function selectYear(year) {
  if (selected.length >= 2) selected = [year];
  else if (selected.length === 1) selected = [selected[0], year].sort((a,b) => Number(a) - Number(b));
  else selected = [year];
  if (selected.length === 1) {
    statusEl.textContent = `Start selected: ${year}. Pick an end year.`;
    svg.querySelectorAll('.year-column').forEach(g => {
      g.classList.toggle('selected', g.dataset.year === year);
      g.classList.remove('in-range');
    });
    return;
  }
  render();
}
function render() {
  svg.innerHTML = '';
  el('rect', { x: 0, y: 0, width: 1800, height: 760, fill: '#fff' });
  YEARS.forEach((year, index) => drawColumn(year, index, sortedPairData(year)));
  drawComputedColumn(annualized(selected[0], selected[1]));
  drawLegend();
  textNode({ class: 'source', x: 28, y: 728 }, 'Source: Bloomberg and Morningstar. Calendar-year returns are gross of fees. Computed column uses inclusive geometric annualization from selected start/end years.');
  textNode({ class: 'source', x: 1770, y: 728, 'text-anchor': 'end' }, '© 2026 Magnus Financial Group LLC. All Rights Reserved');
  updateHighlights();
}
resetBtn.addEventListener('click', () => { selected = ['2005','2025']; render(); });
render();
</script>
